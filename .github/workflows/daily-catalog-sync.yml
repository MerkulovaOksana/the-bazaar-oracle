# Nightly: compare wiki.gg Cargo counts to shipped wiki_catalog.json;
# rebuild if changed; then incremental Bazaar DB image/description enrich.
name: Daily catalog sync

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run daily sync
        run: python scripts/daily_catalog_sync.py --enrich-limit 200

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/data/wiki_catalog.json backend/app/data/bazaardb_enrichment.json || true
          if git diff --staged --quiet; then
            echo "No data file changes."
          else
            git commit -m "chore(data): auto-sync catalog $(date -u +%Y-%m-%d)"
            git push
          fi
