name: Keep Render alive

on:
  schedule:
    # Every 14 minutes, 24/7 — prevents Render free tier from sleeping
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping API health endpoint
        run: |
          URL="${API_URL:-https://bazaar-oracle-api.onrender.com}/api/health"
          echo "Pinging $URL ..."
          curl -sf --max-time 120 "$URL" || echo "Server waking up (expected on first hit)"
        env:
          API_URL: ${{ vars.API_URL || '' }}
